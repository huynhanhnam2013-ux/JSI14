<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Delete Movie - MoviX</title>

    <link rel="stylesheet" href="../Css_spck/admin.css" />
  </head>

  <body>

    <!-- ================= NAVBAR ================= -->

    <div class="navbar">

      <div class="nav-left">

        <div class="logo">
          🎬 MoviX
        </div>

        <div class="nav-menu">

          <a href="admin_home.html">
            Dashboard
          </a>

          <a href="admin_addmovie.html">
            Add Movie
          </a>

          <a
            class="active"
            href="admin_deletemovie.html"
          >
            Delete Movie
          </a>

          <a href="admin_editmovie.html">
            Edit Movie
          </a>

          <a href="home.html">
            Back To MoviX
          </a>

        </div>

      </div>

      <div class="nav-right">

        <a class="admin-btn">
          ⚙ Admin
        </a>

        <div
          class="account-box"
          id="accountBox"
        >

          <div class="account-info">

            <div class="avatar">
              👤
            </div>

            <div>

              <div class="hello-text">
                Xin chào
              </div>

              <span id="accountName">
                Admin
              </span>

            </div>

          </div>

          <div
            class="account-menu"
            id="accountMenu"
          >

            <a href="profile.html">
              Trang cá nhân
            </a>

            <button id="logoutBtn">
              Đăng xuất
            </button>

          </div>

        </div>

      </div>

    </div>

    <!-- ================= HERO ================= -->

    <section class="admin-hero">

      <span class="admin-tag">
        DELETE MOVIE
      </span>

      <div class="hero-text">

        <h1>
          Quản lý xóa phim
        </h1>

        <p>
          Tìm kiếm và xóa những bộ phim không còn sử dụng.
        </p>

      </div>

    </section>

    <!-- ================= CONTENT ================= -->

    <section class="content">

      <div class="section-header">

        <div class="mini-title">
          MOVIES
        </div>

        <h2 class="section-title">
          Danh sách phim
        </h2>

      </div>

      <!-- SEARCH -->

      <div class="delete-search">

        <input
          id="searchInput"
          type="text"
          placeholder="🔍 Tìm theo tên hoặc thể loại..."
        />

      </div>

      <!-- MOVIE GRID -->

      <div
        id="movieList"
        class="delete-grid"
      >

      </div>

    </section>

    <!-- Firebase -->

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="../Js_spck/firebase-config.js"></script>

    <script src="../Js_spck/admin_deletemovie.js"></script>
