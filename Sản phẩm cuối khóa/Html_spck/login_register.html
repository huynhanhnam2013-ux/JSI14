<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MoviX NOVA - Đăng nhập</title>

    <link rel="stylesheet" href="../Css_spck/login_register.css" />

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- BACKGROUND BLUR -->
    <div class="background-overlay"></div>

    <div class="auth-container">
      <!-- LEFT -->
      <div class="auth-left">
        <div class="logo">🎬 <span>MoviX NOVA</span></div>

        <h1 id="authTitle">Chào mừng đến MoviX NOVA</h1>

        <p id="authDesc">
          Thế giới phim ảnh không giới hạn đang chờ bạn khám phá cùng MoviX NOVA
        </p>
      </div>

      <!-- RIGHT -->
      <div class="auth-card">
        <!-- TAB -->
        <div class="auth-tabs">
          <button class="tab-btn active" id="loginTab">Đăng nhập</button>

          <button class="tab-btn" id="registerTab">Đăng ký</button>
        </div>

        <form class="auth-form active-form" id="loginForm">
          <h2>Đăng nhập</h2>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="Nhập email" />
          </div>

          <div class="input-group">
            <label>Mật khẩu</label>
            <input
              type="password"
              id="login-password"
              placeholder="Nhập mật khẩu"
            />
          </div>

          <button type="button" class="submit-btn" onclick="loginUser()">
            Đăng nhập
          </button>
        </form>

        <form class="auth-form" id="registerForm">
          <h2>Đăng ký</h2>

          <div class="input-group">
            <label>Tên người dùng</label>
            <input type="text" id="reg-name" placeholder="Nhập username" />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" id="reg-email" placeholder="Nhập email" />
          </div>

          <div class="input-group">
            <label>Mật khẩu</label>
            <input
              type="password"
              id="reg-password"
              placeholder="Tạo mật khẩu"
            />
          </div>

          <div class="input-group">
            <label>Nhập lại mật khẩu</label>
            <input
              type="password"
              id="reg-confirm-password"
              placeholder="Nhập lại mật khẩu"
            />
          </div>

          <button type="button" class="submit-btn" onclick="registerUser()">
            Tạo tài khoản
          </button>
        </form>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config -->
    <script src="../Js_spck/firebase-config.js"></script>

    <!-- Auth -->
    <script src="../Js_spck/auth.js"></script>

    <!-- Login Register JS -->
    <script src="../Js_spck/login_register.js"></script>
  </body>
</html>
